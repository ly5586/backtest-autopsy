version: "3.8"
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.json:/freqtrade/config.json
      - ./strategy:/freqtrade/user_data/strategies
    command: >
      trade
      --strategy SingleB
      --config /freqtrade/config.json
      --dry-run
